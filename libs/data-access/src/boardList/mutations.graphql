    }
    ... on BoardList {
      cards {
        deadline
        description
        id
        name
        order
      }
      id
      name
      order
    }
  }
}

mutation DeleteBoardList($listId: String!) {
  deleteBoardList(listId: $listId) {
    ... on NotFoundError {
      code
