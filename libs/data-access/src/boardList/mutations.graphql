mutation CreateBoardList($boardId: String!, $input: BoardListInput!) {
  createBoardList(boardId: $boardId, input: $input) {
    ... on ValidationError {
      code
      fields
      messages
    }
    ... on NotFoundError {
      code
      message
    }
    ... on BoardList {
      cards {
        deadline
        description
        id
        name
        order
      }
      id
      name
      order
    }
  }
}

mutation UpdateBoardList($listId: String!, $input: BoardListUpdateInput!) {
  updateBoardList(listId: $listId, input: $input) {
    ... on NotFoundError {
      code
