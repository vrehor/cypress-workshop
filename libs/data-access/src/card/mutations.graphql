mutation CreateCard($listId: String!, $input: CardInput!) {
  createCard(listId: $listId, input: $input) {
    ... on ValidationError {
      code
      fields
      messages
    }
    ... on NotFoundError {
      code
      message
    }
    ... on Card {
      description
      deadline
      id
      name
      order
      done
    }
  }
}

mutation UpdateCard($cardId: String!, $input: CardUpdateInput!) {
  updateCard(cardId: $cardId, input: $input) {
    ... on NotFoundError {
      code
      message
    }
    ... on Card {
      description
      deadline
      id
      name
      order
      done
    }
  }
}

mutation DeleteCard($cardId: String!) {
  deleteCard(cardId: $cardId) {
    ... on NotFoundError {
      code
      message
    }
    ... on Card {
      description
      deadline
      id
      name
      order
      done
    }
  }
}
