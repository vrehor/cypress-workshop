query Boards {
  boards {
    id
    name
    starred
  }
}

query Board($boardId: String!) {
  board(boardId: $boardId) {
    ... on Board {
      id
      name
      starred
      lists {
        cards {
          deadline
          description
          id
          name
          order
          done
        }
        id
        name
        order
      }
    }
    ... on NotFoundError {
      code
      message
    }
  }
}
