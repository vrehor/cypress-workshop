mutation CreateBoard($input: BoardInput!) {
  createBoard(input: $input) {
    ... on ValidationError {
      code
      fields
      messages
    }
    ... on Board {
      id
      name
      starred
    }
  }
}

mutation UpdateBoard($input: BoardUpdateInput!, $boardId: String!) {
  updateBoard(input: $input, boardId: $boardId) {
    ... on NotFoundError {
      code
      message
    }
    ... on Board {
      id
      name
      starred
    }
  }
}

mutation DeleteBoard($boardId: String!) {
  deleteBoard(boardId: $boardId) {
    ... on NotFoundError {
      code
      message
    }
    ... on Board {
      id
      name
      starred
    }
  }
}
